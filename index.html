    <script>
      ;(() => {
        const STORAGE_KEY = 'wwcalc.app.v21'
        const themeVariants = [
          'light',
          'pastel-pink',
          'pastel-blue',
          'vibrant-citrus',
          'glassy-rainbow',
          'sunlit-haze',
          'dark',
          'dark-alt',
          'cosmic-rainbow',
          'scarlet-nebula',
          'emerald-forest',
          'graphite-pop',
          'frosted-aurora',
        ]

        try {
          const raw = window.localStorage.getItem(STORAGE_KEY)
          if (!raw) return

          const parsed = JSON.parse(raw)
          const ui = parsed?.ui
          if (!ui) return

          const isDark = ui.theme === 'dark'
          const activeVariant =
            ui.theme === 'background'
              ? ui.backgroundVariant
              : isDark
                ? ui.darkVariant
                : ui.lightVariant

          if (!themeVariants.includes(activeVariant)) return

          const body = document.body
          body.classList.remove(...themeVariants, 'blur-off', 'dark-text', 'light-text')
          body.classList.add(activeVariant, isDark ? 'dark-text' : 'light-text')

          if (ui.blurMode) body.classList.add('blur-off')
        } catch {}
      })()
    </script>
    <div id="root"></div>
    <div id="tooltip-portal"></div>
